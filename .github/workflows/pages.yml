name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Basic sanity check
        run: echo "Deploy sanity check passed"

      - name: Release check
        run: python scripts/release_check.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare pages artifact
        run: |
          set -euo pipefail
          rm -rf pages_artifact
          mkdir -p pages_artifact/{css,js,data,icons}

          required_files=(
            "index.html"
            "css/style.css"
            "manifest.json"
            "sw.js"
            "icons/icon-192.svg"
            "icons/icon-512.svg"
            "js/auth.js"
            "js/data.js"
            "js/map.js"
            "js/pwa.js"
            "js/ui.js"
            "js/ui.ugc.js"
            "js/ui.moderation.js"
            "js/ugc.js"
            "js/ux.js"
            "js/safe-dom.js"
            "js/state.js"
            "js/research_slices.js"
            "js/stories.js"
            "js/courses_runtime.js"
            "js/uploads.js"
            "data/features.geojson"
            "data/layers.json"
            "data/courses.json"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required artifact file: $file" >&2
              exit 1
            fi
            mkdir -p "pages_artifact/$(dirname "$file")"
            cp "$file" "pages_artifact/$file"
          done

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages_artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
