name: Export Airtable Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run pytest
        run: pytest tests/

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run Airtable export
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: Features
        run: |
          set -euo pipefail
          python scripts/export_airtable.py
          if [ -f data/features.geojson ]; then
            echo "features.geojson size: $(wc -c < data/features.geojson) bytes"
          else
            echo "features.geojson is missing" >&2
            exit 1
          fi

      - name: "Release guard: validate features.geojson"
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/features.geojson")
          if not path.exists():
              raise SystemExit("ERROR: data/features.geojson not found")

          raw = path.read_text(encoding="utf-8").strip()
          if not raw:
              print("WARNING: data/features.geojson is empty, skipping schema check")
              raise SystemExit(0)

          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"ERROR: invalid JSON in data/features.geojson: {exc}") from exc

          if not isinstance(payload, dict) or payload.get("type") != "FeatureCollection":
              raise SystemExit("ERROR: data/features.geojson must be a GeoJSON FeatureCollection")

          print("Release guard OK: FeatureCollection is valid")
          PY

      - name: Debug data files
        run: ls -lh data/

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "update data" || echo "no changes"
          git push origin HEAD:${{ github.ref_name }}

# CHECK:
# - Добавить secrets в GitHub:
#   AIRTABLE_TOKEN
#   AIRTABLE_BASE
# - Проверить ручной запуск workflow
# - Проверить появление data/features.geojson
