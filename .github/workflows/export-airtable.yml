name: Export Airtable Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run Airtable export
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: Features
        run: |
          set -euo pipefail
          python scripts/export_airtable.py
          if [ -f data/features.geojson ]; then
            echo "features.geojson size: $(wc -c < data/features.geojson) bytes"
          else
            echo "features.geojson is missing" >&2
            exit 1
          fi

      - name: Debug data files
        run: ls -lh data/

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "update data" || echo "no changes"
          git push origin HEAD:${{ github.ref_name }}

# CHECK:
# - Добавить secrets в GitHub:
#   AIRTABLE_TOKEN
#   AIRTABLE_BASE
# - Проверить ручной запуск workflow
# - Проверить появление data/features.geojson
