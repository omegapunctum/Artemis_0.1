name: Export Airtable Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run pytest (non-Redis lanes)
        run: |
          pytest tests/ \
            --ignore=tests/test_auth_redis_integration.py \
            --ignore=tests/test_auth_redis_multi_instance.py \
            --ignore=tests/test_auth_redis_restart.py

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run release gate (block export on fail)
        run: |
          if python scripts/release_check.py; then
            echo "✔ Release gate passed"
          else
            echo "✖ Release gate failed → blocking export" >&2
            exit 1
          fi

      - name: Run Airtable export
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          AIRTABLE_TABLE: Features
        run: |
          set -euo pipefail
          python scripts/export_airtable.py
          if [ -f data/features.geojson ]; then
            echo "features.geojson size: $(wc -c < data/features.geojson) bytes"
          else
            echo "features.geojson is missing" >&2
            exit 1
          fi

      - name: Run release gate on exported artifacts
        run: |
          python scripts/release_check.py

      - name: Debug data files
        run: ls -lh data/

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "update data" || echo "no changes"
          git push origin HEAD:${{ github.ref_name }}

# CHECK:
# - Добавить secrets в GitHub:
#   AIRTABLE_TOKEN
#   AIRTABLE_BASE
# - Проверить ручной запуск workflow
# - Проверить появление data/features.geojson
