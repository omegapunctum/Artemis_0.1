name: Release Discipline Gate (Structural)

on:
  push:
  pull_request:

jobs:
  release-gate:
    name: Structural release gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run release gate
        # Structural release-discipline check; this workflow does not replace full regression testing.
        run: python scripts/release_check.py
