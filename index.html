<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTEMIS</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    /* ── СБРОС И БАЗОВЫЕ СТИЛИ ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #060610;
      color: #dde0f0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── КАРТА — ФОНОВЫЙ СЛОЙ ── */
    #map { position: fixed; inset: 0; z-index: 0; }

    /* ── ОБЩИЙ КЛАСС «ЖИДКОЕ СТЕКЛО» ── */
    .glass {
      background: rgba(8, 8, 20, 0.68);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ════════════════════════════════════
       ЛЕВАЯ ПАНЕЛЬ
    ════════════════════════════════════ */
    #sidebar {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 256px;
      max-height: calc(100vh - 32px);
      z-index: 200;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Шапка с логотипом */
    #sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    #sidebar-header h1 {
      font-size: 17px;
      letter-spacing: 4px;
      color: #a8bcff;
      font-weight: 600;
      margin-bottom: 2px;
    }
    #sidebar-header .subtitle {
      font-size: 10px;
      color: #444;
      letter-spacing: 0.3px;
    }

    /* Тело — прокручиваемое */
    #sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #445;
      margin-bottom: 8px;
    }

    /* ── ПОИСК ── */
    #search-wrap { position: relative; }
    #search-input {
      width: 100%;
      padding: 8px 28px 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: #dde;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: rgba(100,130,255,0.4); }
    #search-input::placeholder { color: #3a3a52; }
    #search-clear {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: #445;
      cursor: pointer; font-size: 15px; display: none; line-height: 1;
    }
    #search-clear.visible { display: block; }
    #search-results {
      margin-top: 5px;
      display: none;
      flex-direction: column;
      gap: 1px;
      max-height: 210px;
      overflow-y: auto;
    }
    #search-results.visible { display: flex; }
    .sr-item {
      padding: 7px 9px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.12s;
    }
    .sr-item:hover { background: rgba(74,106,255,0.1); }
    .sr-name { color: #ccd; line-height: 1.3; }
    .sr-meta { font-size: 10px; color: #445; margin-top: 2px; }
    .sr-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .sr-empty { font-size: 11px; color: #445; text-align: center; padding: 10px 0; }

    /* ── СЛОИ ── */
    .layer-row {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.035);
    }
    .layer-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .layer-name { font-size: 12px; color: #bbc; flex: 1; }
    .layer-cnt  { font-size: 10px; color: #445; }
    .layer-toggle {
      width: 28px; height: 16px;
      background: #1e1e30;
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .layer-toggle.on { background: #4a6aff; }
    .layer-toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.18s;
    }
    .layer-toggle.on::after { left: 14px; }

    /* ── СТИЛЬ КАРТЫ ── */
    #style-buttons {
      display: flex;
      gap: 6px;
    }
    .style-btn {
      flex: 1;
      padding: 6px 4px;
      font-size: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      color: #556;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .style-btn:hover { background: rgba(255,255,255,0.07); color: #99a; }
    .style-btn.active {
      background: rgba(74,106,255,0.15);
      border-color: rgba(74,106,255,0.35);
      color: #a0b4ff;
    }

    /* ── СТАТУС ── */
    #status-line { font-size: 10px; color: #333; padding-top: 2px; }

    /* ════════════════════════════════════
       ШКАЛА ВРЕМЕНИ — СНИЗУ ПО ЦЕНТРУ
    ════════════════════════════════════ */
    #timeline-wrap {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      width: 500px;
      max-width: calc(100vw - 300px);
      /* Переход при появлении диапазонных слайдеров */
      transition: bottom 0.0s;
    }

    #timeline-bar {
      border-radius: 16px;
      padding: 13px 20px 12px;
      /* Жидкое стекло */
      background: rgba(6, 6, 18, 0.72);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.5),
        0 1px 0 rgba(255,255,255,0.04) inset;
    }

    /* Основная строка */
    #tl-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #year-display {
      font-size: 18px;
      color: #a0b4ff;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
      flex-shrink: 0;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    #timeline-slider {
      flex: 1;
      accent-color: #4a6aff;
      cursor: pointer;
    }

    #tl-range-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    #range-checkbox { accent-color: #4a6aff; cursor: pointer; }
    #tl-range-toggle label {
      font-size: 10px;
      color: #556;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    /* Диапазонные слайдеры — выезжают снизу */
    #range-sliders {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1),
                  opacity    0.28s ease,
                  margin-top 0.38s cubic-bezier(0.4,0,0.2,1);
      margin-top: 0;
    }
    #range-sliders.open {
      max-height: 72px;
      opacity: 1;
      margin-top: 10px;
    }

    .rrow {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px;
    }
    .rrow:last-child { margin-bottom: 0; }
    .rlabel { font-size: 10px; color: #445; width: 24px; flex-shrink: 0; }
    .rrow input[type=range] { flex: 1; accent-color: #4a6aff; cursor: pointer; }
    .rval { font-size: 11px; color: #a0b4ff; width: 76px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* ════════════════════════════════════
       ПОПАП
    ════════════════════════════════════ */
    .maplibregl-popup-content {
      background: rgba(12, 12, 28, 0.97);
      backdrop-filter: blur(16px);
      color: #dde0f0;
      border-radius: 11px;
      padding: 0;
      max-width: 295px;
      border: 1px solid rgba(74,106,255,0.18);
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .maplibregl-popup-close-button {
      color: #445;
      font-size: 18px;
      padding: 8px 10px;
      z-index: 1;
      line-height: 1;
      background: none;
      border: none;
      cursor: pointer;
      position: absolute;
      right: 0; top: 0;
    }
    .maplibregl-popup-close-button:hover { color: #99a; }
    .maplibregl-popup-tip { border-top-color: rgba(12,12,28,0.97) !important; }

    .popup-img {
      width: 100%;
      max-height: 130px;
      object-fit: cover;
      display: block;
    }
    .popup-body { padding: 11px 13px 13px; }
    .popup-badge {
      display: inline-block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-bottom: 7px;
      font-weight: 700;
    }
    .popup-title {
      font-size: 14px;
      font-weight: 600;
      color: #c8d4ff;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .popup-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3px 9px;
      margin-bottom: 8px;
    }
    .pm-k { font-size: 10px; color: #445; }
    .pm-v { font-size: 10px; color: #99a; }
    .popup-desc {
      font-size: 11px;
      color: #778;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .popup-link {
      font-size: 10px;
      color: #4a6aff;
      text-decoration: none;
    }
    .popup-link:hover { color: #7a9aff; }

    /* ════════════════════════════════════
       ПАНЕЛЬ ТОКЕНА
    ════════════════════════════════════ */
    #token-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 998;
      backdrop-filter: blur(6px);
    }
    #token-panel {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      background: rgba(12, 12, 28, 0.98);
      border: 1px solid rgba(74,106,255,0.2);
      border-radius: 14px;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 13px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    #token-panel h2 {
      font-size: 12px; color: #a0b4ff;
      letter-spacing: 2.5px; text-transform: uppercase;
    }
    #token-panel p { font-size: 11px; color: #556; line-height: 1.65; }
    #token-input {
      width: 100%; padding: 9px 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px; color: #dde;
      font-size: 12px; font-family: monospace; outline: none;
    }
    #token-input:focus { border-color: rgba(74,106,255,0.45); }
    #token-submit {
      padding: 10px; background: #4a6aff; color: #fff;
      border: none; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500;
      transition: background 0.18s;
    }
    #token-submit:hover:not(:disabled) { background: #3a5aef; }
    #token-submit:disabled { opacity: 0.5; cursor: default; }
    #token-error { font-size: 11px; color: #e84a3a; display: none; }

    /* Позиции встроенных контролов карты */
    .maplibregl-ctrl-top-right  { top: 16px; right: 16px; }
    .maplibregl-ctrl-bottom-right { bottom: 16px; right: 16px; }

    /* Полупрозрачная навигация */
    .maplibregl-ctrl-group {
      background: rgba(8, 8, 20, 0.55) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
    }
    .maplibregl-ctrl-group button {
      background: transparent !important;
    }
    .maplibregl-ctrl-group button + button {
      border-top: 1px solid rgba(255,255,255,0.06) !important;
    }
    .maplibregl-ctrl-icon { filter: invert(0.7); }
    .maplibregl-ctrl-scale {
      background: rgba(8, 8, 20, 0.55) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 6px !important;
      color: rgba(200,210,255,0.7) !important;
      font-size: 10px !important;
      padding: 2px 6px !important;
    }
  </style>
</head>
<body>

  <!-- КАРТА -->
  <div id="map"></div>

  <!-- ЛЕВАЯ ПАНЕЛЬ -->
  <div id="sidebar" class="glass">
    <div id="sidebar-header">
      <h1>ARTEMIS</h1>
      <div class="subtitle">интерактивная карта истории</div>
    </div>
    <div id="sidebar-body">

      <!-- Поиск -->
      <div>
        <div class="section-label">Поиск</div>
        <div id="search-wrap">
          <input id="search-input" type="text" placeholder="Название или тег…" autocomplete="off" />
          <button id="search-clear" title="Очистить">×</button>
        </div>
        <div id="search-results"></div>
      </div>

      <!-- Слои -->
      <div id="layers-section">
        <div class="section-label">Слои</div>
        <div id="layers-list"></div>
      </div>

      <!-- Стиль карты -->
      <div>
        <div class="section-label">Стиль карты</div>
        <div id="style-buttons">
          <button class="style-btn active" data-style="dark">Тёмная</button>
          <button class="style-btn" data-style="light">Светлая</button>
          <button class="style-btn" data-style="voyager">Классика</button>
        </div>
      </div>

      <!-- Статус -->
      <div id="status-line">Введите токен…</div>

    </div>
  </div>

  <!-- ШКАЛА ВРЕМЕНИ -->
  <div id="timeline-wrap">
    <div id="timeline-bar">
      <div id="tl-main">
        <div id="year-display">1200</div>
        <input type="range" id="timeline-slider" min="-500" max="2024" value="1200" step="1" />
        <div id="tl-range-toggle">
          <input type="checkbox" id="range-checkbox" />
          <label for="range-checkbox">Диапазон</label>
        </div>
      </div>
      <div id="range-sliders">
        <div class="rrow">
          <span class="rlabel">От</span>
          <input type="range" id="range-from" min="-500" max="2024" value="1000" step="1" />
          <span class="rval" id="rfrom-val">1000</span>
        </div>
        <div class="rrow">
          <span class="rlabel">До</span>
          <input type="range" id="range-to" min="-500" max="2024" value="1400" step="1" />
          <span class="rval" id="rto-val">1400</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ПАНЕЛЬ ТОКЕНА -->
  <div id="token-overlay"></div>
  <div id="token-panel">
    <h2>ARTEMIS — Доступ</h2>
    <p>Введите Airtable Personal Access Token.<br>
    Токен не сохраняется и не передаётся никуда, кроме Airtable API.</p>
    <input id="token-input" type="password" placeholder="patXXXXXXXXXXXXXXXX…" autocomplete="off" />
    <div id="token-error"></div>
    <button id="token-submit">Загрузить карту</button>
  </div>

<script>
  // ── КОНФИГУРАЦИЯ ──────────────────────────────────────────
  const BASE_ID  = 'appHmf8ubeUF9nfkO';
  const TABLE_ID = 'tblNGMtwZuLlhrZNe';
  const API_URL  = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`;

  // Слои — цвет и подпись
  const LAYERS = [
    { id: 'romanesque',  ru: 'Романский',  hex: '#e8a838' },
    { id: 'gothic',      ru: 'Готика',     hex: '#7a5af0' },
    { id: 'renaissance', ru: 'Ренессанс',  hex: '#3ab87a' },
  ];

  // Стили карты
  const MAP_STYLES = {
    dark:    'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    light:   'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    voyager: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
  };

  // ── СОСТОЯНИЕ ─────────────────────────────────────────────
  const state = {
    year:      1200,
    from:      1000,
    to:        1400,
    range:     false,
    query:     '',
    active:    new Set(LAYERS.map(l => l.id)),
    features:  [],
    markers:   [],
  };

  // ── ИНИЦИАЛИЗАЦИЯ КАРТЫ ───────────────────────────────────
  const map = new maplibregl.Map({
    container: 'map',
    style:     MAP_STYLES.dark,
    center:    [12, 48],
    zoom:      4,
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-right');
  map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

  // ── СМЕНА СТИЛЯ КАРТЫ ─────────────────────────────────────
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      map.setStyle(MAP_STYLES[btn.dataset.style]);
      // После загрузки нового стиля — перерисовать GeoJSON-слои
      map.once('style.load', () => renderCircles());
    });
  });

  // ── ЗАГРУЗКА ДАННЫХ ИЗ AIRTABLE ──────────────────────────
  async function loadFeatures(token) {
    let all = [], offset = null;
    do {
      const url = offset ? `${API_URL}?offset=${offset}` : API_URL;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error(res.status === 401 || res.status === 403 ? 'auth' : `HTTP ${res.status}`);
      const data = await res.json();
      all    = all.concat(data.records);
      offset = data.offset;
    } while (offset);
    return all;
  }

  // ── КОНВЕРТАЦИЯ ЗАПИСЕЙ ───────────────────────────────────
  function parse(records) {
    return records
      // is_active хранится как строка "TRUE"/"FALSE"
      .filter(r => String(r.fields.is_active || '').toLowerCase() === 'true')
      .map(r => {
        const f = r.fields;
        return {
          id:        r.id,
          layer_id:  f.layer_id     || '',
          name_ru:   f.name_ru      || '',
          date_start: f.date_start  || null,
          date_end:   f.date_end    || null,
          lon:   f.longitude != null ? parseFloat(f.longitude) : null,
          lat:   f.latitude  != null ? parseFloat(f.latitude)  : null,
          radius:   f.influence_radius_km ? parseInt(f.influence_radius_km) : null,
          desc:     f.title_short   || '',
          architect:f.architect     || null,
          img:      f.image_url     || null,
          src:      f.source_url    || '',
          tags:     f.tags ? f.tags.split(',').map(t => t.trim().toLowerCase()) : [],
        };
      });
  }

  // ── ОБРАБОТКА ВВОДА ТОКЕНА ───────────────────────────────
  async function submit() {
    const token = document.getElementById('token-input').value.trim();
    const errEl = document.getElementById('token-error');
    const btn   = document.getElementById('token-submit');
    errEl.style.display = 'none';
    if (!token) return;
    btn.textContent = 'Загружаю…';
    btn.disabled    = true;
    setStatus('Загрузка из Airtable…');
    try {
      const records  = await loadFeatures(token);
      state.features = parse(records);
      document.getElementById('token-panel').style.display   = 'none';
      document.getElementById('token-overlay').style.display = 'none';
      renderLayers();
      initSearch();
      renderAll();
    } catch(e) {
      errEl.style.display = 'block';
      errEl.textContent   = e.message === 'auth' ? 'Ошибка авторизации — проверьте токен.' : `Ошибка: ${e.message}`;
      btn.textContent = 'Загрузить карту';
      btn.disabled    = false;
      setStatus('Ошибка загрузки.');
    }
  }
  document.getElementById('token-submit').addEventListener('click', submit);
  document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  // ── ВИДИМОСТЬ ОБЪЕКТА ВО ВРЕМЕНИ ─────────────────────────
  // Здание показывается если: уже построено И ещё не разрушено.
  // Если date_end отсутствует — здание стоит до сих пор (всегда visible после постройки).
  function visible(f) {
    const s = parseInt(f.date_start);
    if (isNaN(s)) return false;
    // date_end: null, пустая строка или отсутствие = объект существует до сих пор
    const rawEnd = (f.date_end !== null && f.date_end !== '' && f.date_end !== undefined)
      ? parseInt(f.date_end) : null;
    const e = (rawEnd !== null && !isNaN(rawEnd)) ? rawEnd : null;

    if (state.range) {
      if (s > state.to)                  return false; // ещё не построено до конца диапазона
      if (e !== null && e < state.from)  return false; // уже разрушено до начала диапазона
      return true;
    } else {
      if (s > state.year)                return false; // ещё не построено
      if (e !== null && e < state.year)  return false; // уже разрушено
      return true;
    }
  }

  // ── ГЛАВНАЯ ОТРИСОВКА ─────────────────────────────────────
  function renderAll() { renderMarkers(); renderCircles(); updateStatus(); }

  // ── МАРКЕРЫ ───────────────────────────────────────────────
  function renderMarkers() {
    state.markers.forEach(m => m.remove());
    state.markers = [];

    state.features.forEach(f => {
      if (!state.active.has(f.layer_id)) return;
      if (!visible(f))                   return;
      if (f.lon == null || f.lat == null) return;

      const layer = LAYERS.find(l => l.id === f.layer_id);
      const color = layer ? layer.hex : '#fff';

      // DOM-элемент маркера
      const el = document.createElement('div');
      el.style.cssText = `
        width:11px;height:11px;border-radius:50%;
        background:${color};border:2px solid rgba(255,255,255,0.45);
        cursor:pointer;box-shadow:0 0 8px ${color}99;
        transition:width 0.12s, height 0.12s, box-shadow 0.12s, margin 0.12s;
      `;
      el.addEventListener('mouseenter', () => {
        el.style.width      = '17px';
        el.style.height     = '17px';
        el.style.margin     = '-3px 0 0 -3px';
        el.style.boxShadow  = `0 0 16px ${color}cc`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.width      = '11px';
        el.style.height     = '11px';
        el.style.margin     = '0';
        el.style.boxShadow  = `0 0 8px ${color}99`;
      });

      // Данные для попапа
      const styleName  = layer ? layer.ru : f.layer_id;
      const builtStr   = f.date_start || '—';
      const destroyStr = f.date_end   || null;
      const archStr    = f.architect  || null;

      // Изображение: referrerpolicy="no-referrer" решает проблему с блокировкой Wikimedia
      const imgTag = f.img
        ? `<img class="popup-img" src="${f.img}" alt="${f.name_ru}" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none'">`
        : '';

      // Метаданные в попапе (только непустые строки)
      const metaRows = [
        ['Построен',   builtStr],
        destroyStr ? ['Разрушен', destroyStr] : null,
        archStr    ? ['Архитектор', archStr]  : null,
        ['Стиль',    styleName],
      ].filter(Boolean).map(([k,v]) =>
        `<span class="pm-k">${k}</span><span class="pm-v">${v}</span>`
      ).join('');

      const popup = new maplibregl.Popup({ offset: 14, closeButton: true, maxWidth: '295px' })
        .setHTML(`
          ${imgTag}
          <div class="popup-body">
            <span class="popup-badge" style="background:${color}22;color:${color}">${styleName}</span>
            <div class="popup-title">${f.name_ru}</div>
            <div class="popup-meta">${metaRows}</div>
            ${f.desc ? `<div class="popup-desc">${f.desc}</div>` : ''}
            ${f.src  ? `<a class="popup-link" href="${f.src}" target="_blank" rel="noopener">→ источник</a>` : ''}
          </div>
        `);

      state.markers.push(
        new maplibregl.Marker({ element: el })
          .setLngLat([f.lon, f.lat])
          .setPopup(popup)
          .addTo(map)
      );
    });
  }

  // ── КРУГИ ВЛИЯНИЯ ─────────────────────────────────────────
  // Используется для объектов с заполненным influence_radius_km.
  // Перекрывающиеся круги дают визуальный эффект "накопления" за счёт аддитивной непрозрачности.
  function renderCircles() {
    ['circles-fill','circles-stroke'].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
    if (map.getSource('circles')) map.removeSource('circles');

    const feats = state.features
      .filter(f => state.active.has(f.layer_id) && visible(f) && f.lon != null && f.radius != null)
      .map(f => {
        const color = (LAYERS.find(l => l.id === f.layer_id) || {}).hex || '#fff';
        return {
          type: 'Feature',
          geometry: { type: 'Polygon', coordinates: [circlePoly(f.lon, f.lat, f.radius)] },
          properties: { color },
        };
      });

    if (!feats.length) return;
    map.addSource('circles', { type: 'geojson', data: { type: 'FeatureCollection', features: feats } });
    map.addLayer({ id: 'circles-fill',   type: 'fill', source: 'circles', paint: { 'fill-color': ['get','color'], 'fill-opacity': 0.07 } });
    map.addLayer({ id: 'circles-stroke', type: 'line', source: 'circles', paint: { 'line-color': ['get','color'], 'line-width': 1, 'line-opacity': 0.28 } });
  }

  // Генерация GeoJSON-полигона окружности
  function circlePoly(lng, lat, km, n = 64) {
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const a = (i / n) * 2 * Math.PI;
      pts.push([
        lng + (km / 111.32 / Math.cos(lat * Math.PI / 180)) * Math.sin(a),
        lat + (km / 111.32) * Math.cos(a),
      ]);
    }
    return pts;
  }

  // ── СПИСОК СЛОЁВ В САЙДБАРЕ ──────────────────────────────
  function renderLayers() {
    const list = document.getElementById('layers-list');
    list.innerHTML = '';
    LAYERS.forEach(layer => {
      const cnt    = state.features.filter(f => f.layer_id === layer.id).length;
      const isOn   = state.active.has(layer.id);
      const row    = document.createElement('div');
      row.className = 'layer-row';
      row.innerHTML = `
        <div class="layer-dot" style="background:${layer.hex}"></div>
        <span class="layer-name">${layer.ru}</span>
        <span class="layer-cnt">${cnt}</span>
        <button class="layer-toggle ${isOn ? 'on' : ''}" data-id="${layer.id}"></button>`;
      row.querySelector('button').addEventListener('click', () => {
        state.active.has(layer.id) ? state.active.delete(layer.id) : state.active.add(layer.id);
        renderLayers();
        renderAll();
      });
      list.appendChild(row);
    });
  }

  // ── ПОИСК ─────────────────────────────────────────────────
  function initSearch() {
    const inp = document.getElementById('search-input');
    const clr = document.getElementById('search-clear');
    inp.addEventListener('input', () => {
      state.query = inp.value.trim();
      clr.classList.toggle('visible', state.query.length > 0);
      showSearchResults(state.query);
    });
    inp.addEventListener('keydown', e => { if (e.key === 'Escape') clearSearch(); });
    clr.addEventListener('click', clearSearch);
  }

  function showSearchResults(q) {
    const box = document.getElementById('search-results');
    box.innerHTML = '';
    if (!q) { box.classList.remove('visible'); return; }
    const ql      = q.toLowerCase();
    const results = state.features.filter(f =>
      f.name_ru.toLowerCase().includes(ql) || f.tags.some(t => t.includes(ql))
    ).slice(0, 20);
    if (!results.length) {
      box.innerHTML = '<div class="sr-empty">Ничего не найдено</div>';
      box.classList.add('visible');
      return;
    }
    results.forEach(f => {
      const layer = LAYERS.find(l => l.id === f.layer_id);
      const item  = document.createElement('div');
      item.className = 'sr-item';
      item.innerHTML = `
        <div class="sr-name">${f.name_ru}</div>
        <div class="sr-meta">
          <span class="sr-dot" style="background:${layer?.hex||'#888'}"></span>
          ${layer?.ru || f.layer_id}${f.date_start ? ' · ' + f.date_start : ''}
        </div>`;
      item.addEventListener('click', () => {
        if (f.lon == null) return;
        map.flyTo({ center: [f.lon, f.lat], zoom: 7, duration: 800 });
        const marker = state.markers.find(m => {
          const ll = m.getLngLat();
          return Math.abs(ll.lng - f.lon) < 0.001 && Math.abs(ll.lat - f.lat) < 0.001;
        });
        if (marker) marker.togglePopup();
        clearSearch();
      });
      box.appendChild(item);
    });
    box.classList.add('visible');
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    const box = document.getElementById('search-results');
    box.classList.remove('visible');
    box.innerHTML = '';
    state.query = '';
  }

  // ── ШКАЛА — ОДИНОЧНЫЙ ГОД ────────────────────────────────
  const sliderEl   = document.getElementById('timeline-slider');
  const yearDispEl = document.getElementById('year-display');
  sliderEl.addEventListener('input', () => {
    state.year         = parseInt(sliderEl.value);
    yearDispEl.textContent = fy(state.year);
    renderAll();
  });

  // ── ШКАЛА — ДИАПАЗОН ─────────────────────────────────────
  const chk      = document.getElementById('range-checkbox');
  const rfEl     = document.getElementById('range-from');
  const rtEl     = document.getElementById('range-to');
  const rfValEl  = document.getElementById('rfrom-val');
  const rtValEl  = document.getElementById('rto-val');
  const rsEl     = document.getElementById('range-sliders');

  chk.addEventListener('change', () => {
    state.range = chk.checked;
    rsEl.classList.toggle('open', state.range);
    renderAll();
  });

  rfEl.addEventListener('input', () => {
    state.from = parseInt(rfEl.value);
    if (state.from > state.to) { state.to = state.from; rtEl.value = state.to; rtValEl.textContent = fy(state.to); }
    rfValEl.textContent = fy(state.from);
    renderAll();
  });

  rtEl.addEventListener('input', () => {
    state.to = parseInt(rtEl.value);
    if (state.to < state.from) { state.from = state.to; rfEl.value = state.from; rfValEl.textContent = fy(state.from); }
    rtValEl.textContent = fy(state.to);
    renderAll();
  });

  // ── УТИЛИТЫ ───────────────────────────────────────────────
  // Форматирование года: отрицательные — до н.э.
  function fy(y) { return y < 0 ? `${Math.abs(y)} до н.э.` : String(y); }

  function setStatus(msg) { document.getElementById('status-line').textContent = msg; }

  function updateStatus() {
    const vis   = state.markers.length;
    const total = state.features.filter(f => state.active.has(f.layer_id)).length;
    const time  = state.range ? `${fy(state.from)} — ${fy(state.to)}` : fy(state.year);
    setStatus(`Показано: ${vis} / ${total} · ${time}`);
  }

  // ── ЗАПУСК ────────────────────────────────────────────────
  map.on('load', () => {
    renderLayers();
    setStatus('Введите токен для загрузки данных…');
  });
</script>
</body>
</html>
