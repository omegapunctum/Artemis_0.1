<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTEMIS</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <aside id="sidebar">
    <button id="sidebar-toggle" type="button" aria-label="Свернуть или развернуть панель">☰</button>
    <h1>ARTEMIS</h1>

    <label for="search-input">Поиск по названию</label>
    <input id="search-input" type="search" placeholder="Введите название" />

    <label for="layer-filter">Фильтр по слою</label>
    <select id="layer-filter">
      <option value="">Все слои</option>
    </select>

    <div class="date-filters">
      <div>
        <label for="date-from">Дата от</label>
        <input id="date-from" type="number" placeholder="Напр. 1800" />
      </div>
      <div>
        <label for="date-to">Дата до</label>
        <input id="date-to" type="number" placeholder="Напр. 1950" />
      </div>
    </div>

    <section>
      <h2>Объекты</h2>
      <ul id="object-list"></ul>
    </section>
  </aside>

  <main id="map"></main>
  <div id="status">Загрузка данных...</div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module">
    import { loadFeatures } from './js/data.js';
    import { initMap } from './js/map.js';
    import { initUI } from './js/ui.js';

    const status = document.getElementById('status');

    try {
      const features = await loadFeatures();
      const map = initMap('map', features);
      initUI(map, features);
      status.textContent = `Загружено объектов: ${features.features?.length ?? 0}`;
    } catch (error) {
      status.textContent = 'Ошибка загрузки данных. Проверьте консоль.';
    }
  </script>
</body>
</html>
