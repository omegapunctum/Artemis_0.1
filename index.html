<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTEMIS</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <aside id="sidebar" aria-label="Панель фильтров и списка объектов">
    <button id="sidebar-toggle" type="button" aria-label="Свернуть или развернуть панель" aria-expanded="true">☰</button>
    <h1>ARTEMIS</h1>

    <div id="auth-buttons" class="top-controls">
      <button id="login-btn" type="button">Login</button>
      <button id="register-btn" type="button">Register</button>
      <button id="install-app-btn" type="button" hidden disabled>Install</button>
    </div>

    <section id="profile-panel" hidden>
      <h2>Профиль</h2>
      <div class="profile-actions">
        <button id="open-draft-editor-btn" type="button">Создать черновик</button>
        <button id="refresh-drafts-btn" type="button">Мои черновики</button>
        <button id="logout-btn" type="button">Logout</button>
      </div>
      <ul id="drafts-list"></ul>
    </section>

    <section id="moderation-panel" hidden>
      <h3>Moderation</h3>
      <div id="moderation-list"></div>
    </section>

    <section class="filters-panel" aria-label="Фильтры">
      <label for="search-input">Поиск по названию</label>
      <input id="search-input" type="search" placeholder="Введите название" autocomplete="off" />

      <label for="layer-filter">Фильтр по слою</label>
      <select id="layer-filter">
        <option value="">Все слои</option>
      </select>

      <div class="date-filters">
        <div>
          <label for="date-from">Дата от</label>
          <input id="date-from" type="number" placeholder="Напр. -300" />
        </div>
        <div>
          <label for="date-to">Дата до</label>
          <input id="date-to" type="number" placeholder="Напр. 1950" />
        </div>
      </div>
    </section>

    <section class="results-summary" aria-label="Сводка результатов">
      <div><strong>Найдено:</strong> <span id="results-count">0</span></div>
      <div><strong>На карте:</strong> <span id="map-count">0</span></div>
      <div><strong>Активных фильтров:</strong> <span id="active-filters-count">0</span></div>
    </section>

    <section>
      <h2>Объекты</h2>
      <ul id="object-list"></ul>
    </section>
  </aside>

  <main id="map" aria-label="Карта объектов"></main>

  <div id="error-banner" hidden></div>
  <div id="loading-indicator" hidden>Loading...</div>

  <div id="status" class="status-panel" role="status" aria-live="polite">
    <div id="status-loading" class="status-loading">Инициализация приложения…</div>
    <div id="status-message">Ожидание загрузки…</div>
    <div id="status-error" class="status-error" hidden></div>
  </div>

  <div id="login-modal" class="modal" hidden>
    <div class="modal-content">
      <button type="button" class="modal-close" data-close-modal aria-label="Закрыть">×</button>
      <h3>Вход / Регистрация</h3>
      <form id="login-form" data-mode="login" novalidate>
        <label>Email <input type="email" name="email" required /></label>
        <label>Пароль <input type="password" name="password" minlength="8" required /></label>
        <button type="submit">Продолжить</button>
      </form>
    </div>
  </div>

  <div id="draft-modal" class="modal" hidden>
    <div class="modal-content draft-modal-content">
      <button type="button" class="modal-close" data-close-modal aria-label="Закрыть">×</button>
      <h3>Редактор черновика</h3>
      <form id="draft-form" novalidate>
        <label>name_ru <input name="name_ru" required /></label>
        <label>name_en <input name="name_en" /></label>
        <label>layer_id
          <select name="layer_id" required>
            <option value="">Выберите слой</option>
          </select>
        </label>
        <label>date_start <input name="date_start" inputmode="numeric" /></label>
        <label>date_construction_end <input name="date_construction_end" inputmode="numeric" /></label>
        <label>date_end <input name="date_end" inputmode="numeric" /></label>
        <label>longitude <input name="longitude" /></label>
        <label>latitude <input name="latitude" /></label>
        <label>influence_radius_km <input name="influence_radius_km" /></label>
        <label>title_short <input name="title_short" /></label>
        <label>description <textarea name="description"></textarea></label>
        <label>tags (comma separated) <input name="tags" /></label>
        <label>image upload <input name="image_file" type="file" accept=".jpg,.jpeg,.png,.webp,image/*" /></label>
        <label>source_media_url <input name="source_media_url" /></label>
        <label>source_license <input name="source_license" /></label>
        <div id="draft-errors"></div>
        <button type="submit">Сохранить черновик</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module">
    import { loadFeatures } from './js/data.js';
    import { initMap } from './js/map.js';
    import { initUI } from './js/ui.js';
    import { refreshToken } from './js/auth.js';
    import { initUGCUI } from './js/ui.ugc.js';
    import { initModerationUI } from './js/ui.moderation.js';
    import { initPWA } from './js/pwa.js';
    import { showError, clearError, showLoading, hideLoading } from './js/ux.js';

    initPWA();

    const statusMessage = document.getElementById('status-message');
    const statusError = document.getElementById('status-error');
    const statusLoading = document.getElementById('status-loading');

    // Обновляет строку состояния приложения без лишнего шума.
    function setStatus(message, { error = false, loading = true } = {}) {
      statusMessage.textContent = message;
      statusLoading.hidden = !loading;
      statusError.hidden = !error;
      statusError.textContent = error ? message : '';
    }

    try {
      setStatus('Загрузка токена…', { loading: true });
      showLoading();
      try {
        await refreshToken();
      } catch (error) {
        console.info('Сессия не восстановлена:', error.message);
      } finally {
        hideLoading();
      }

      clearError();
      setStatus('Загрузка данных…', { loading: true });
      const features = await loadFeatures();

      setStatus('Инициализация карты…', { loading: true });
      const map = initMap('map', features);

      setStatus('Инициализация интерфейса…', { loading: true });
      const uiState = await initUI(map, features);
      await initUGCUI();
      await initModerationUI();

      const foundCount = uiState?.getVisibleCounts?.().listCount ?? features.features?.length ?? 0;
      const mapCount = uiState?.getVisibleCounts?.().mapCount ?? 0;
      clearError();
      setStatus(`Карта готова. Найдено: ${foundCount}, на карте: ${mapCount}.`, { loading: false });
    } catch (error) {
      console.error('Ошибка инициализации:', error);
      showError('Ошибка загрузки данных. Проверьте доступность /data/features.geojson и /data/layers.json.');
      setStatus('Ошибка загрузки данных. Проверьте доступность /data/features.geojson и /data/layers.json.', { error: true, loading: false });
    }
  </script>
</body>
</html>
