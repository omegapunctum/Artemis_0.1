<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTEMIS — Интерактивная карта истории</title>

  <!-- MapLibre GL JS v4.7.1 -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #12121a;
      border-bottom: 1px solid #2a2a3a; z-index: 10;
    }
    #header h1 { font-size: 18px; letter-spacing: 2px; color: #a0b4ff; }
    #header span { font-size: 12px; color: #666; }

    #main { display: flex; flex: 1; overflow: hidden; }
    #map  { flex: 1; }

    #sidebar {
      width: 260px; background: #12121a;
      border-left: 1px solid #2a2a3a;
      display: flex; flex-direction: column;
      padding: 16px; gap: 20px; overflow-y: auto;
    }
    .section-title {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: #666; margin-bottom: 10px;
    }

    /* ── Слои ── */
    .layer-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #1e1e2e;
    }
    .layer-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .layer-label { font-size: 13px; }
    .layer-toggle {
      margin-left: auto; width: 32px; height: 18px;
      background: #333; border-radius: 9px;
      position: relative; cursor: pointer; border: none;
      transition: background 0.2s;
    }
    .layer-toggle.active { background: #4a6aff; }
    .layer-toggle::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; background: #fff;
      border-radius: 50%; top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .layer-toggle.active::after { left: 16px; }

    /* ── Шкала времени ── */
    #timeline-section { margin-top: auto; }
    #year-display {
      font-size: 24px; color: #a0b4ff;
      text-align: center; margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    #timeline-slider { width: 100%; accent-color: #4a6aff; cursor: pointer; }
    #timeline-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #555; margin-top: 4px;
    }

    /* ── Режим диапазона ── */
    #range-mode-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    #range-mode-toggle input { accent-color: #4a6aff; cursor: pointer; }
    #range-mode-toggle label { font-size: 11px; color: #888; cursor: pointer; }
    #range-sliders { display: none; flex-direction: column; gap: 8px; }
    #range-sliders.visible { display: flex; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-label { font-size: 10px; color: #666; width: 28px; }
    .range-val   { font-size: 11px; color: #a0b4ff; width: 72px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Попап ── */
    .maplibregl-popup-content {
      background: #1a1a2e; color: #e0e0e0;
      border-radius: 8px; padding: 14px;
      max-width: 280px; border: 1px solid #2a2a4a;
    }
    .popup-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #a0b4ff; }
    .popup-date  { font-size: 11px; color: #888; margin-bottom: 8px; }
    .popup-desc  { font-size: 12px; line-height: 1.5; }
    .popup-img   { width: 100%; border-radius: 4px; margin-bottom: 8px; max-height: 120px; object-fit: cover; }
    .popup-link  { display: inline-block; margin-top: 8px; font-size: 11px; color: #4a6aff; text-decoration: none; }

    /* ── Панель токена ── */
    #token-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 998;
    }
    #token-panel {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999; background: #1a1a2e;
      border: 1px solid #2a2a4a; border-radius: 10px;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 12px;
      width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    #token-panel h2 { font-size: 13px; color: #a0b4ff; letter-spacing: 1.5px; text-transform: uppercase; }
    #token-panel p  { font-size: 11px; color: #666; line-height: 1.6; }
    #token-input {
      width: 100%; padding: 9px 10px;
      background: #0a0a0f; border: 1px solid #2a2a4a;
      border-radius: 6px; color: #e0e0e0;
      font-size: 12px; font-family: monospace; outline: none;
    }
    #token-input:focus { border-color: #4a6aff; }
    #token-submit {
      padding: 9px; background: #4a6aff; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: background 0.2s;
    }
    #token-submit:hover:not(:disabled) { background: #3a5aef; }
    #token-submit:disabled { opacity: 0.6; cursor: default; }
    #token-error { font-size: 11px; color: #e84a3a; display: none; }

    /* ── Поиск ── */
    #search-section { flex-shrink: 0; }
    #search-wrap { position: relative; }
    #search-input {
      width: 100%; padding: 8px 30px 8px 10px;
      background: #0a0a0f; border: 1px solid #2a2a4a;
      border-radius: 6px; color: #e0e0e0;
      font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: #4a6aff; }
    #search-clear {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: #555;
      cursor: pointer; font-size: 16px; display: none; line-height: 1;
    }
    #search-clear.visible { display: block; }
    #search-results {
      margin-top: 6px; display: none;
      flex-direction: column; gap: 2px;
      max-height: 220px; overflow-y: auto;
    }
    #search-results.visible { display: flex; }
    .search-result-item {
      padding: 7px 8px; border-radius: 5px;
      cursor: pointer; font-size: 12px; line-height: 1.4;
      transition: background 0.15s;
    }
    .search-result-item:hover { background: #1e1e3a; }
    .search-result-name { color: #e0e0e0; }
    .search-result-meta { font-size: 10px; color: #555; margin-top: 2px; }
    .search-result-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .search-no-results { font-size: 12px; color: #555; padding: 8px; text-align: center; }

    #status-bar {
      padding: 6px 16px; background: #0d0d1a;
      font-size: 11px; color: #555;
      border-top: 1px solid #1a1a2a;
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>ARTEMIS</h1>
    <span>интерактивная карта истории</span>
  </div>

  <div id="main">
    <div id="map"></div>

    <div id="sidebar">

      <div id="search-section">
        <div class="section-title">Поиск</div>
        <div id="search-wrap">
          <input id="search-input" type="text" placeholder="Название или тег…" autocomplete="off" />
          <button id="search-clear" title="Очистить">×</button>
        </div>
        <div id="search-results"></div>
      </div>

      <div id="layers-section">
        <div class="section-title">Слои</div>
        <div id="layers-list"></div>
      </div>

      <div id="timeline-section">
        <div class="section-title">Шкала времени</div>

        <!-- Переключатель режима -->
        <div id="range-mode-toggle">
          <input type="checkbox" id="range-checkbox" />
          <label for="range-checkbox">Диапазон (от — до)</label>
        </div>

        <!-- Одиночный год -->
        <div id="single-slider">
          <div id="year-display">1200</div>
          <input type="range" id="timeline-slider" min="-500" max="2024" value="1200" step="1" />
          <div id="timeline-labels">
            <span>500 до н.э.</span>
            <span>2024</span>
          </div>
        </div>

        <!-- Диапазон от–до -->
        <div id="range-sliders">
          <div class="range-row">
            <span class="range-label">От</span>
            <input type="range" id="range-from" min="-500" max="2024" value="1000" step="1" style="flex:1;accent-color:#4a6aff" />
            <span class="range-val" id="range-from-val">1000</span>
          </div>
          <div class="range-row">
            <span class="range-label">До</span>
            <input type="range" id="range-to" min="-500" max="2024" value="1300" step="1" style="flex:1;accent-color:#4a6aff" />
            <span class="range-val" id="range-to-val">1300</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="status-bar">Введите токен для загрузки данных…</div>
  <div id="token-overlay"></div>
  <div id="token-panel">
    <h2>ARTEMIS — Доступ к данным</h2>
    <p>Введите Airtable Personal Access Token.<br>Токен не сохраняется и не передаётся никуда, кроме Airtable API.</p>
    <input id="token-input" type="password" placeholder="patXXXXXXXXXXXXXXXX..." autocomplete="off" />
    <div id="token-error"></div>
    <button id="token-submit">Загрузить карту</button>
  </div>

<script>
  // ── КОНФИГУРАЦИЯ AIRTABLE ─────────────────────────────────
  const BASE_ID  = 'appHmf8ubeUF9nfkO';
  const TABLE_ID = 'tblNGMtwZuLlhrZNe';
  const API_URL  = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`;

  // ── КОНФИГУРАЦИЯ СЛОЁВ ────────────────────────────────────
  // [TODO: Фаза 2] загружать из таблицы Layers через API
  const LAYERS_CONFIG = [
    { layer_id: 'romanesque', name_ru: 'Романская архитектура', color_hex: '#e8a838', is_enabled: true },
    { layer_id: 'napoleon',   name_ru: 'Наполеоновские походы', color_hex: '#3a8fe8', is_enabled: true },
    { layer_id: 'amur_tiger', name_ru: 'Амурский тигр',         color_hex: '#e84a3a', is_enabled: true }
  ];

  // ── СОСТОЯНИЕ ─────────────────────────────────────────────
  const state = {
    currentYear:    1200,
    rangeFrom:      1000,
    rangeTo:        1300,
    rangeMode:      false,
    searchQuery:    '',
    activeLayerIds: new Set(LAYERS_CONFIG.filter(l => l.is_enabled).map(l => l.layer_id)),
    features:       [],
    markers:        []
  };

  // ── ИНИЦИАЛИЗАЦИЯ КАРТЫ ───────────────────────────────────
  const map = new maplibregl.Map({
    container: 'map',
    style:     'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center:    [20, 45],
    zoom:      3
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-left');
  map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

  // ── ЗАГРУЗКА ИЗ AIRTABLE ─────────────────────────────────
  async function loadFeatures(token) {
    let allRecords = [];
    let offset     = null;
    do {
      const url      = offset ? `${API_URL}?offset=${offset}` : API_URL;
      const response = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!response.ok) throw new Error(response.status === 401 || response.status === 403 ? 'auth' : `HTTP ${response.status}`);
      const data = await response.json();
      allRecords     = allRecords.concat(data.records);
      offset         = data.offset;
    } while (offset);
    return allRecords;
  }

  // ── КОНВЕРТАЦИЯ ЗАПИСЕЙ ───────────────────────────────────
  function parseRecords(records) {
    return records
      .filter(r => r.fields.is_active)
      .map(r => ({
        id:               r.id,
        layer_id:         r.fields.layer_id             || '',
        layer_type:       r.fields.layer_type           || '',
        name_ru:          r.fields.name_ru              || '',
        date_start:       r.fields.date_start           || null,
        date_end:         r.fields.date_end             || null,
        longitude:        r.fields.longitude   != null  ? parseFloat(r.fields.longitude)           : null,
        latitude:         r.fields.latitude    != null  ? parseFloat(r.fields.latitude)            : null,
        influence_radius: r.fields.influence_radius_km  ? parseInt(r.fields.influence_radius_km)   : null,
        sequence_order:   r.fields.sequence_order       ? parseInt(r.fields.sequence_order)        : null,
        title_short:      r.fields.title_short          || '',
        image_url:        r.fields.image_url            || null,
        source_url:       r.fields.source_url           || '',
        tags:             r.fields.tags                 ? r.fields.tags.split(',').map(t => t.trim().toLowerCase()) : []
      }));
  }

  // ── ОБРАБОТКА ТОКЕНА ─────────────────────────────────────
  async function handleTokenSubmit() {
    const token = document.getElementById('token-input').value.trim();
    const errEl = document.getElementById('token-error');
    const btn   = document.getElementById('token-submit');
    errEl.style.display = 'none';
    if (!token) return;

    btn.textContent = 'Загружаю…';
    btn.disabled    = true;
    setStatus('Загрузка данных из Airtable…');

    try {
      const records  = await loadFeatures(token);
      state.features = parseRecords(records);
      document.getElementById('token-panel').style.display   = 'none';
      document.getElementById('token-overlay').style.display = 'none';
      console.log(`Загружено: ${records.length}, активных: ${state.features.length}`);
      renderLayersList();
      initSearch();
      renderAll();
    } catch (e) {
      errEl.style.display = 'block';
      errEl.textContent   = e.message === 'auth' ? 'Ошибка авторизации — проверьте токен.' : `Ошибка: ${e.message}`;
      setStatus('Ошибка загрузки данных.');
      btn.textContent = 'Загрузить карту';
      btn.disabled    = false;
    }
  }

  document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleTokenSubmit(); });
  document.getElementById('token-submit').addEventListener('click', handleTokenSubmit);

  // ── ПОИСК ─────────────────────────────────────────────────

  // Проверяет совпадение объекта с поисковым запросом
  function matchesSearch(feature, query) {
    if (!query) return true;
    const q = query.toLowerCase();
    // Поиск по названию
    if (feature.name_ru.toLowerCase().includes(q)) return true;
    // Поиск по тегам (точное совпадение тега)
    if (feature.tags.some(tag => tag.includes(q)))  return true;
    return false;
  }

  // Отрисовывает выпадающий список результатов поиска
  function renderSearchResults(query) {
    const container = document.getElementById('search-results');
    container.innerHTML = '';

    if (!query) {
      container.classList.remove('visible');
      return;
    }

    const q       = query.toLowerCase();
    const results = state.features.filter(f => matchesSearch(f, q)).slice(0, 20);

    if (results.length === 0) {
      container.innerHTML = '<div class="search-no-results">Ничего не найдено</div>';
      container.classList.add('visible');
      return;
    }

    results.forEach(feature => {
      const layerCfg = LAYERS_CONFIG.find(l => l.layer_id === feature.layer_id);
      const color    = layerCfg ? layerCfg.color_hex : '#888';
      const dateStr  = feature.date_start || '';

      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `
        <div class="search-result-name">${feature.name_ru}</div>
        <div class="search-result-meta">
          <span class="search-result-dot" style="background:${color}"></span>
          ${layerCfg ? layerCfg.name_ru : feature.layer_id}
          ${dateStr ? ' · ' + dateStr : ''}
        </div>
      `;

      // Клик — летим на маркер и открываем попап
      item.addEventListener('click', () => {
        if (feature.longitude == null || feature.latitude == null) return;
        map.flyTo({ center: [feature.longitude, feature.latitude], zoom: 6, duration: 800 });
        // Найти и открыть попап соответствующего маркера
        const marker = state.markers.find(m => {
          const ll = m.getLngLat();
          return Math.abs(ll.lng - feature.longitude) < 0.001 && Math.abs(ll.lat - feature.latitude) < 0.001;
        });
        if (marker) marker.togglePopup();
        clearSearch();
      });

      container.appendChild(item);
    });

    container.classList.add('visible');
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    document.getElementById('search-results').classList.remove('visible');
    document.getElementById('search-results').innerHTML = '';
    state.searchQuery = '';
  }

  // Слушатели поиска — инициализируются после загрузки данных
  function initSearch() {
    const input = document.getElementById('search-input');
    const clear = document.getElementById('search-clear');

    input.addEventListener('input', () => {
      state.searchQuery = input.value.trim();
      clear.classList.toggle('visible', state.searchQuery.length > 0);
      renderSearchResults(state.searchQuery);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') clearSearch();
    });

    clear.addEventListener('click', clearSearch);
  }

  // ── СПИСОК СЛОЁВ ─────────────────────────────────────────
  function renderLayersList() {
    const container = document.getElementById('layers-list');
    container.innerHTML = '';
    LAYERS_CONFIG.forEach(layer => {
      const isActive = state.activeLayerIds.has(layer.layer_id);
      const item     = document.createElement('div');
      item.className = 'layer-item';
      item.innerHTML = `
        <div class="layer-dot" style="background:${layer.color_hex}"></div>
        <span class="layer-label">${layer.name_ru}</span>
        <button class="layer-toggle ${isActive ? 'active' : ''}" data-id="${layer.layer_id}"></button>
      `;
      item.querySelector('button').addEventListener('click', () => toggleLayer(layer.layer_id));
      container.appendChild(item);
    });
  }

  function toggleLayer(layerId) {
    state.activeLayerIds.has(layerId)
      ? state.activeLayerIds.delete(layerId)
      : state.activeLayerIds.add(layerId);
    renderLayersList();
    renderAll();
  }

  // ── ПРОВЕРКА ВИДИМОСТИ ПО ВРЕМЕНИ ────────────────────────
  function visibleInTime(feature) {
    const start = parseInt(feature.date_start);
    const end   = feature.date_end ? parseInt(feature.date_end) : start + 100;
    return state.rangeMode
      ? start <= state.rangeTo && end >= state.rangeFrom
      : state.currentYear >= start && state.currentYear <= end;
  }

  // ── ГЕНЕРАЦИЯ ПОЛИГОНА ОКРУЖНОСТИ ────────────────────────
  function circlePolygon(lng, lat, radiusKm, steps = 64) {
    const coords = [];
    for (let i = 0; i <= steps; i++) {
      const angle = (i / steps) * 2 * Math.PI;
      const dlng  = (radiusKm / 111.32) / Math.cos(lat * Math.PI / 180);
      const dlat  =  radiusKm / 111.32;
      coords.push([lng + dlng * Math.sin(angle), lat + dlat * Math.cos(angle)]);
    }
    return coords;
  }

  // ── ГЛАВНАЯ ОТРИСОВКА ─────────────────────────────────────
  function renderAll() {
    renderMarkers();
    renderCircles();
    renderRoutes();
  }

  // ── МАРКЕРЫ ───────────────────────────────────────────────
  function renderMarkers() {
    state.markers.forEach(m => m.remove());
    state.markers = [];

    state.features.forEach(feature => {
      if (!state.activeLayerIds.has(feature.layer_id))           return;
      if (!visibleInTime(feature))                               return;
      if (feature.longitude == null || feature.latitude == null) return;

      const layerCfg = LAYERS_CONFIG.find(l => l.layer_id === feature.layer_id);
      const color    = layerCfg ? layerCfg.color_hex : '#ffffff';

      const el = document.createElement('div');
      el.style.cssText = `
        width:14px; height:14px; border-radius:50%;
        background:${color}; border:2px solid rgba(255,255,255,0.6);
        cursor:pointer; box-shadow:0 0 6px ${color};
      `;

      const dateStr = feature.date_end
        ? `${feature.date_start} — ${feature.date_end}`
        : feature.date_start;

      const popup = new maplibregl.Popup({ offset: 14, closeButton: true, maxWidth: '300px' })
        .setHTML(`
          ${feature.image_url ? `<img class="popup-img" src="${feature.image_url}" alt="${feature.name_ru}">` : ''}
          <div class="popup-title">${feature.name_ru}</div>
          <div class="popup-date">${dateStr}</div>
          <div class="popup-desc">${feature.title_short}</div>
          <a class="popup-link" href="${feature.source_url}" target="_blank">→ источник</a>
        `);

      state.markers.push(
        new maplibregl.Marker({ element: el })
          .setLngLat([feature.longitude, feature.latitude])
          .setPopup(popup)
          .addTo(map)
      );
    });

    updateStatus();
  }

  // ── КРУГИ ВЛИЯНИЯ ─────────────────────────────────────────
  function renderCircles() {
    if (map.getLayer('circles-fill'))   map.removeLayer('circles-fill');
    if (map.getLayer('circles-stroke')) map.removeLayer('circles-stroke');
    if (map.getSource('circles'))       map.removeSource('circles');

    const features = state.features
      .filter(f =>
        state.activeLayerIds.has(f.layer_id) &&
        visibleInTime(f) &&
        f.longitude != null && f.latitude != null &&
        f.influence_radius != null
      )
      .map(f => {
        const color = (LAYERS_CONFIG.find(l => l.layer_id === f.layer_id) || {}).color_hex || '#fff';
        return {
          type: 'Feature',
          geometry: { type: 'Polygon', coordinates: [circlePolygon(f.longitude, f.latitude, f.influence_radius)] },
          properties: { color }
        };
      });

    if (!features.length) return;

    map.addSource('circles', { type: 'geojson', data: { type: 'FeatureCollection', features } });
    map.addLayer({ id: 'circles-fill',   type: 'fill', source: 'circles', paint: { 'fill-color': ['get','color'], 'fill-opacity': 0.08 } });
    map.addLayer({ id: 'circles-stroke', type: 'line', source: 'circles', paint: { 'line-color': ['get','color'], 'line-width': 1.5, 'line-opacity': 0.4 } });
  }

  // ── МАРШРУТНЫЕ ЛИНИИ ──────────────────────────────────────
  function renderRoutes() {
    if (map.getLayer('routes-line')) map.removeLayer('routes-line');
    if (map.getSource('routes'))     map.removeSource('routes');

    // Собираем точки маршрута по слоям — только видимые по времени
    const byLayer = {};
    state.features
      .filter(f =>
        state.activeLayerIds.has(f.layer_id) &&
        f.layer_type === 'route_point' &&
        f.longitude != null && f.latitude != null &&
        f.sequence_order != null &&
        routePointVisible(f)   // фильтр по шкале времени
      )
      .forEach(f => {
        (byLayer[f.layer_id] = byLayer[f.layer_id] || []).push(f);
      });

    // Линия строится только если есть минимум 2 точки
    const features = Object.entries(byLayer)
      .filter(([, pts]) => pts.length >= 2)
      .map(([layerId, pts]) => {
        const sorted = pts.sort((a, b) => a.sequence_order - b.sequence_order);
        const color  = (LAYERS_CONFIG.find(l => l.layer_id === layerId) || {}).color_hex || '#fff';
        return {
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: sorted.map(p => [p.longitude, p.latitude]) },
          properties: { color }
        };
      });

    if (!features.length) return;

    map.addSource('routes', { type: 'geojson', data: { type: 'FeatureCollection', features } });
    map.addLayer({
      id: 'routes-line', type: 'line', source: 'routes',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': ['get','color'], 'line-width': 1.5, 'line-opacity': 0.5, 'line-dasharray': [2, 2] }
    });
  }

  // Точка маршрута видна если её date_start попадает в текущий временной срез
  function routePointVisible(f) {
    const start = parseInt(f.date_start);
    if (state.rangeMode) {
      // В режиме диапазона — точка внутри диапазона
      return start >= state.rangeFrom && start <= state.rangeTo;
    }
    // В режиме одного года — все точки до текущего года включительно
    return start <= state.currentYear;
  }

  // ── ШКАЛА — ОДИНОЧНЫЙ ГОД ────────────────────────────────
  const slider      = document.getElementById('timeline-slider');
  const yearDisplay = document.getElementById('year-display');
  slider.addEventListener('input', () => {
    state.currentYear       = parseInt(slider.value);
    yearDisplay.textContent = formatYear(state.currentYear);
    renderAll();
  });

  // ── ШКАЛА — ДИАПАЗОН ─────────────────────────────────────
  const rangeCheckbox = document.getElementById('range-checkbox');
  const rangeFrom     = document.getElementById('range-from');
  const rangeTo       = document.getElementById('range-to');
  const rangeFromVal  = document.getElementById('range-from-val');
  const rangeToVal    = document.getElementById('range-to-val');

  rangeCheckbox.addEventListener('change', () => {
    state.rangeMode = rangeCheckbox.checked;
    document.getElementById('single-slider').style.display = state.rangeMode ? 'none' : 'block';
    document.getElementById('range-sliders').classList.toggle('visible', state.rangeMode);
    renderAll();
  });

  rangeFrom.addEventListener('input', () => {
    state.rangeFrom = parseInt(rangeFrom.value);
    if (state.rangeFrom > state.rangeTo) { state.rangeTo = state.rangeFrom; rangeTo.value = state.rangeTo; rangeToVal.textContent = formatYear(state.rangeTo); }
    rangeFromVal.textContent = formatYear(state.rangeFrom);
    renderAll();
  });

  rangeTo.addEventListener('input', () => {
    state.rangeTo = parseInt(rangeTo.value);
    if (state.rangeTo < state.rangeFrom) { state.rangeFrom = state.rangeTo; rangeFrom.value = state.rangeFrom; rangeFromVal.textContent = formatYear(state.rangeFrom); }
    rangeToVal.textContent = formatYear(state.rangeTo);
    renderAll();
  });

  // ── УТИЛИТЫ ───────────────────────────────────────────────
  function formatYear(y) { return y < 0 ? `${Math.abs(y)} до н.э.` : String(y); }

  function updateStatus() {
    const timeStr = state.rangeMode
      ? `${formatYear(state.rangeFrom)} — ${formatYear(state.rangeTo)}`
      : `Год: ${formatYear(state.currentYear)}`;
    setStatus(`Показано: ${state.markers.length} объектов | ${timeStr}`);
  }

  function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

  // ── ЗАПУСК ────────────────────────────────────────────────
  map.on('load', () => {
    renderLayersList();
    setStatus('Введите токен для загрузки данных…');
  });
</script>
</body>
</html>
